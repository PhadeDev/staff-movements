      - btnEditDetails:
          Control: ModernButton@1.0.0
          Properties:
            X: =20
            Y: =64
            Width: =130
            Height: =36
            Text: ="Edit Details"
            BasePaletteColor: =RGBA(80,80,80,1)
            OnSelect: =Set(varShowEditPanel, true)
      - btnMarkComplete:
          Control: ModernButton@1.0.0
          Properties:
            X: =164
            Y: =64
            Width: =160
            Height: =36
            Text: ="Mark Complete"
            BasePaletteColor: =RGBA(0,78,66,1)
            Visible: =!varSelectedRecord.Complete
            OnSelect: |-
              =Patch('Staff Movements (LTD)', varSelectedRecord,
                  {Complete: true, DateCompleted: Today()}
              );
              Set(varSelectedRecord, LookUp('Staff Movements (LTD)', ID = varSelectedRecord.ID));
              ClearCollect(colMovements, 'Staff Movements (LTD)');
              Notify("Marked as complete.", NotificationType.Success)
      - btnReOpen:
