            Height: =36
            Text: ="Re-Open"
            BasePaletteColor: =RGBA(120,120,120,1)
            Visible: =varSelectedRecord.Complete
            OnSelect: |-
              =Patch('Staff Movements (LTD)', varSelectedRecord,
                  {Complete: false, DateCompleted: Blank()}
              );
              Set(varSelectedRecord, LookUp('Staff Movements (LTD)', ID = varSelectedRecord.ID));
              ClearCollect(colMovements, 'Staff Movements (LTD)');
              Notify("Record re-opened.", NotificationType.Success)
