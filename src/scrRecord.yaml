- scrRecord:
    Control: Screen
    Properties:
      Fill: =RGBA(248,248,248,1)
      OnVisible: |-
        =Set(varShowEditPanel, false);
        Set(varShowLeaverPanel, false)
    Children:
      - recHeader:
          Control: Classic/Button@2.2.0
          Properties:
            X: =0
            Y: =0
            Width: =1366
            Height: =56
            Fill: =RGBA(0,78,66,1)
            HoverFill: =Self.Fill
            PressedFill: =Self.Fill
            DisabledFill: =Self.Fill
            BorderThickness: =0
            DisplayMode: =DisplayMode.View
            Text: =""
      - btnBack:
          Control: Classic/Button@2.2.0
          Properties:
            X: =8
            Y: =8
            Width: =40
            Height: =40
            Text: ="‹"
            Color: =RGBA(255,255,255,1)
            Fill: =RGBA(255,255,255,0.12)
            HoverFill: =RGBA(255,255,255,0.22)
            PressedFill: =RGBA(255,255,255,0.32)
            DisabledFill: =RGBA(0,0,0,0)
            BorderThickness: =0
            Size: =24
            OnSelect: |-
              =If(
                  varShowLeaverPanel || varShowEditPanel,
                  Set(varShowLeaverPanel, false);
                  Set(varShowEditPanel, false),
                  Navigate(scrDashboard, ScreenTransition.UnCover)
              )
      - lblRecordTitle:
          Control: Label@2.5.1
          Properties:
            X: =60
            Y: =0
            Width: =900
            Height: =56
            Text: =Coalesce(varSelectedRecord.Title, "Record")
            Color: =RGBA(255,255,255,1)
            Size: =18
            FontWeight: =FontWeight.Bold
            VerticalAlign: =VerticalAlign.Middle
      - lblCompleteTag:
          Control: Label@2.5.1
          Properties:
            X: =1120
            Y: =14
            Width: =110
            Height: =28
            Text: ="Complete"
            Visible: =varSelectedRecord.Complete
            Color: =RGBA(0,100,30,1)
            Fill: =RGBA(210,245,220,1)
            Size: =12
            FontWeight: =FontWeight.Semibold
            Align: =Align.Center
            VerticalAlign: =VerticalAlign.Middle
            RadiusTopLeft: =14
            RadiusTopRight: =14
            RadiusBottomLeft: =14
            RadiusBottomRight: =14
      - recActionBar:
          Control: Classic/Button@2.2.0
          Properties:
            X: =0
            Y: =56
            Width: =1366
            Height: =52
            Fill: =RGBA(255,255,255,1)
