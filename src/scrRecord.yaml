            Height: =40
            Text: ="Save Changes"
            BasePaletteColor: =RGBA(0,78,66,1)
            Visible: =varShowEditPanel
            OnSelect: |-
              =Set(varErrEditTitle, IsBlank(Trim(txtEditTitle.Text)));
              Set(varErrEditMovType, IsBlank(drpEditMovType.Selected.Value));
              If(
                  varErrEditTitle || varErrEditMovType,
                  false,
                  Patch('Staff Movements (LTD)', varSelectedRecord,
                      {
                          Title: Trim(txtEditTitle.Text),
                          'Movement Type': {Value: drpEditMovType.Selected.Value},
                          'Position Type': {Value: drpEditPosType.Selected.Value},
                          Staff_x002f_ServiceNo: Trim(txtEditStaffNo.Text),
                          'Desired Role Name': Trim(txtEditRole.Text),
                          'MML or MOVD?': {Value: drpEditMMLOrMOVD.Selected.Value}
                      }
                  );
                  Set(varSelectedRecord, LookUp('Staff Movements (LTD)', ID = varSelectedRecord.ID));
                  ClearCollect(colMovements, 'Staff Movements (LTD)');
                  Set(varShowEditPanel, false);
                  Set(varErrEditTitle, false);
                  Set(varErrEditMovType, false);
                  Notify("Record updated.", NotificationType.Success)
              )
