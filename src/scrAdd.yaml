Screens:
  scrAdd:
    Properties:
      Fill: =RGBA(248,248,248,1)
      OnVisible: |-
        =Set(varErrAddTitle, false);
        Set(varErrAddMovType, false)
    Children:
      - recHeader:
          Control: Classic/Button@2.2.0
          Properties:
            X: =0
            Y: =0
            Width: =1366
            Height: =56
            Fill: =RGBA(0,78,66,1)
            HoverFill: =Self.Fill
            PressedFill: =Self.Fill
            DisabledFill: =Self.Fill
            BorderThickness: =0
            DisplayMode: =DisplayMode.View
            Text: =""
      - btnAddCancel:
          Control: Classic/Button@2.2.0
          Properties:
            X: =8
            Y: =8
            Width: =80
            Height: =40
            Text: ="Cancel"
            Color: =RGBA(255,255,255,0.85)
            Fill: =RGBA(255,255,255,0.12)
            HoverFill: =RGBA(255,255,255,0.22)
            PressedFill: =RGBA(255,255,255,0.32)
            DisabledFill: =RGBA(0,0,0,0)
            BorderThickness: =0
            Size: =14
            OnSelect: =Navigate(scrDashboard, ScreenTransition.UnCover)
      - lblAddTitle:
          Control: Label@2.5.1
          Properties:
            X: =100
            Y: =0
            Width: =600
            Height: =56
            Text: ="Add New Movement"
            Color: =RGBA(255,255,255,1)
            Size: =18
            FontWeight: =FontWeight.Bold
            VerticalAlign: =VerticalAlign.Middle
      - recFormCard:
          Control: Classic/Button@2.2.0
          Properties:
            X: =83
            Y: =80
            Width: =1200
            Height: =580
            Fill: =RGBA(255,255,255,1)
            HoverFill: =Self.Fill
            PressedFill: =Self.Fill
            DisabledFill: =Self.Fill
            BorderColor: =RGBA(210,218,215,1)
            BorderThickness: =1
            RadiusTopLeft: =8
            RadiusTopRight: =8
            RadiusBottomLeft: =8
            RadiusBottomRight: =8
            DisplayMode: =DisplayMode.View
            Text: =""
      - lblAddTitleFieldLabel:
          Control: Label@2.5.1
          Properties:
            X: =107
            Y: =100
            Width: =500
            Height: =18
            Text: ="Rank/Title and Full Name *"
            Color: =RGBA(80,80,80,1)
            Size: =12
      - recErrAddTitle:
          Control: Classic/Button@2.2.0
          Properties:
            X: =107
            Y: =118
            Width: =500
            Height: =44
            Fill: =RGBA(0,0,0,0)
            DisabledFill: =RGBA(0,0,0,0)
            HoverFill: =RGBA(0,0,0,0)
            PressedFill: =RGBA(0,0,0,0)
            BorderColor: =If(varErrAddTitle, RGBA(163,45,45,1), RGBA(0,0,0,0))
            BorderThickness: =If(varErrAddTitle, 2, 0)
            RadiusTopLeft: =6
            RadiusTopRight: =6
            RadiusBottomLeft: =6
            RadiusBottomRight: =6
            DisplayMode: =DisplayMode.View
            Text: =""
      - txtAddName:
          Control: ModernTextInput@1.1.0
          Properties:
            X: =107
            Y: =118
            Width: =500
            Height: =44
            Placeholder: ="e.g. Cpl J Smith"
      - lblAddMovTypeLabel:
          Control: Label@2.5.1
          Properties:
            X: =683
            Y: =100
            Width: =540
            Height: =18
            Text: ="Movement Type *"
            Color: =RGBA(80,80,80,1)
            Size: =12
      - recErrAddMovType:
          Control: Classic/Button@2.2.0
          Properties:
            X: =683
            Y: =118
            Width: =540
            Height: =44
            Fill: =RGBA(0,0,0,0)
            DisabledFill: =RGBA(0,0,0,0)
            HoverFill: =RGBA(0,0,0,0)
            PressedFill: =RGBA(0,0,0,0)
            BorderColor: =If(varErrAddMovType, RGBA(163,45,45,1), RGBA(0,0,0,0))
            BorderThickness: =If(varErrAddMovType, 2, 0)
            RadiusTopLeft: =6
            RadiusTopRight: =6
            RadiusBottomLeft: =6
            RadiusBottomRight: =6
            DisplayMode: =DisplayMode.View
            Text: =""
      - drpAddMovType:
          Control: ModernDropdown@1.0.1
          Properties:
            X: =683
            Y: =118
            Width: =540
            Height: =44
            Items: =["New to MoD/Branch", "Moving to Branch", "Leaving Branch", "Leaving MoD"]
            Default: '={Value: "New to MoD/Branch"}'
      - lblAddPosTypeLabel:
          Control: Label@2.5.1
          Properties:
            X: =107
            Y: =178
            Width: =500
            Height: =18
            Text: ="Position Type"
            Color: =RGBA(80,80,80,1)
            Size: =12
      - drpAddPosType:
          Control: ModernDropdown@1.0.1
          Properties:
            X: =107
            Y: =196
            Width: =500
            Height: =44
            Items: =["Officer", "Other Rank (OR)", "Civilian", "Contractor"]
            Default: '={Value: ""}'
      - lblAddStaffNoLabel:
          Control: Label@2.5.1
          Properties:
            X: =683
            Y: =178
            Width: =540
            Height: =18
            Text: ="Staff/Service No or PUID"
            Color: =RGBA(80,80,80,1)
            Size: =12
      - txtAddStaffNo:
          Control: ModernTextInput@1.1.0
          Properties:
            X: =683
            Y: =196
            Width: =540
            Height: =44
            Placeholder: ="Service number or PUID"
      - lblAddRoleLabel:
          Control: Label@2.5.1
          Properties:
            X: =107
            Y: =256
            Width: =500
            Height: =18
            Text: ="Desired Role Name"
            Color: =RGBA(80,80,80,1)
            Size: =12
      - txtAddRole:
          Control: ModernTextInput@1.1.0
          Properties:
            X: =107
            Y: =274
            Width: =500
            Height: =44
            Placeholder: ="Post or role title"
      - lblAddStartDateLabel:
          Control: Label@2.5.1
          Properties:
            X: =683
            Y: =256
            Width: =540
            Height: =18
            Text: ="Confirmed Start Date"
            Color: =RGBA(80,80,80,1)
            Size: =12
      - dpAddStartDate:
          Control: Classic/DatePicker@2.6.0
          Properties:
            X: =683
            Y: =274
            Width: =300
            Height: =44
            DefaultDate: =Today()
      - lblAddNotesLabel:
          Control: Label@2.5.1
          Properties:
            X: =107
            Y: =334
            Width: =1116
            Height: =18
            Text: ="Notes"
            Color: =RGBA(80,80,80,1)
            Size: =12
      - txtAddNotes:
          Control: ModernTextInput@1.1.0
          Properties:
            X: =107
            Y: =352
            Width: =1116
            Height: =120
            Placeholder: ="Any additional notes..."
            Type: =TextInputType.Multiline
      - lblAddErrMsg:
          Control: Label@2.5.1
          Properties:
            X: =107
            Y: =488
            Width: =760
            Height: =24
            Text: ="Name and Movement Type are required."
            Color: =RGBA(163,45,45,1)
            Size: =12
            Visible: =varErrAddTitle || varErrAddMovType
      - btnAddSave:
          Control: ModernButton@1.0.0
          Properties:
            X: =1063
            Y: =590
            Width: =180
            Height: =44
            Text: ="Add Movement"
            BasePaletteColor: =RGBA(0,78,66,1)
            OnSelect: |-
              =Set(varErrAddTitle, IsBlank(Trim(txtAddName.Text)));
              Set(varErrAddMovType, IsBlank(drpAddMovType.Selected.Value));
              If(
                  varErrAddTitle || varErrAddMovType,
                  false,
                  Set(varSelectedRecord,
                      Patch('Staff Movements (LTD)', Defaults('Staff Movements (LTD)'),
                          {
                              Title: Trim(txtAddName.Text),
                              'Movement Type': {Value: drpAddMovType.Selected.Value},
                              'Position Type': {Value: drpAddPosType.Selected.Value},
                              Staff_x002f_ServiceNo: Trim(txtAddStaffNo.Text),
                              'Desired Role Name': Trim(txtAddRole.Text),
                              'Confirmed Start Date': dpAddStartDate.SelectedDate,
                              Notes: txtAddNotes.Text,
                              Complete: false
                          }
                      )
                  );
                  ClearCollect(colMovements, 'Staff Movements (LTD)');
                  Set(varErrAddTitle, false);
                  Set(varErrAddMovType, false);
                  Notify("Movement added.", NotificationType.Success);
                  Navigate(scrRecord, ScreenTransition.Cover)
              )
