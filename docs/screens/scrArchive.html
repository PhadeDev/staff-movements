<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PowerApps – scrArchive</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }
    h1 { font-size: 1.4rem; font-weight: 400; color: #a0a0c0; }
    .name { font-size: 1.1rem; font-weight: 600; color: #c8b8ff; }
    button {
      padding: 14px 36px;
      font-size: 1.1rem;
      background: #7c4dff;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #6a3de8; }
    button:active { background: #5830cc; }
    #status {
      font-size: 0.9rem;
      color: #888;
      min-height: 1.2em;
      transition: color 0.2s;
    }
    #status.ok { color: #4caf7d; }
    #status.err { color: #e85555; }
    .info {
      font-size: 0.8rem;
      color: #555;
      margin-top: 8px;
      text-align: center;
      line-height: 1.6;
    }
    .build-stamp {
      position: fixed;
      bottom: 14px;
      right: 18px;
      font-size: 0.72rem;
      color: #3a3a55;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      user-select: none;
    }
  </style>
</head>
<body>
  <h1>PowerApps Screen</h1>
  <div class="name">scrArchive</div>
  <button onclick="copyYAML()">Copy YAML to Clipboard</button>
  <div id="status">Click to copy — PowerApps-ready (CRLF, UTF-8)</div>
  <div class="info">
    After copying, open PowerApps Studio &rarr; select a screen &rarr; Ctrl+V<br>
    or use the paste button in the tree view.
  </div>
  <div class="build-stamp">v1.2  —  Built 23 Jun 2026  10:55 BST</div>
  <script>
    const yaml = "- scrArchive:\r\n    Properties:\r\n      Fill: =RGBA(248,248,248,1)\r\n      OnVisible: |-\r\n        =ClearCollect(colMovements, 'Staff Movements (LTD)')\r\n    Children:\r\n      - recHeader:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            X: =0\r\n            Y: =0\r\n            Width: =1366\r\n            Height: =56\r\n            Fill: =RGBA(0,78,66,1)\r\n            HoverFill: =Self.Fill\r\n            PressedFill: =Self.Fill\r\n            DisabledFill: =Self.Fill\r\n            BorderThickness: =0\r\n            DisplayMode: =DisplayMode.View\r\n            Text: =\"\"\r\n      - btnArchiveBack:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            X: =8\r\n            Y: =8\r\n            Width: =40\r\n            Height: =40\r\n            Text: =\"\u2039\"\r\n            Color: =RGBA(255,255,255,1)\r\n            Fill: =RGBA(255,255,255,0.12)\r\n            HoverFill: =RGBA(255,255,255,0.22)\r\n            PressedFill: =RGBA(255,255,255,0.32)\r\n            DisabledFill: =RGBA(0,0,0,0)\r\n            BorderThickness: =0\r\n            Size: =24\r\n            OnSelect: =Navigate(scrDashboard, ScreenTransition.UnCover)\r\n      - lblArchiveTitle:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =60\r\n            Y: =0\r\n            Width: =700\r\n            Height: =56\r\n            Text: =\"Archive\"\r\n            Color: =RGBA(255,255,255,1)\r\n            Size: =18\r\n            FontWeight: =FontWeight.Bold\r\n            VerticalAlign: =VerticalAlign.Middle\r\n      - lblArchiveInfo:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =800\r\n            Y: =0\r\n            Width: =550\r\n            Height: =56\r\n            Text: =\"Records completed more than 7 days ago\"\r\n            Color: =RGBA(255,255,255,0.65)\r\n            Size: =12\r\n            Align: =Align.Right\r\n            PaddingRight: =20\r\n            VerticalAlign: =VerticalAlign.Middle\r\n      - recListHeader:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            X: =0\r\n            Y: =56\r\n            Width: =1366\r\n            Height: =32\r\n            Fill: =RGBA(230,235,233,1)\r\n            HoverFill: =Self.Fill\r\n            PressedFill: =Self.Fill\r\n            DisabledFill: =Self.Fill\r\n            BorderThickness: =0\r\n            DisplayMode: =DisplayMode.View\r\n            Text: =\"\"\r\n      - lblColName:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =20\r\n            Y: =56\r\n            Width: =400\r\n            Height: =32\r\n            Text: =\"Name\"\r\n            Size: =11\r\n            FontWeight: =FontWeight.Semibold\r\n            Color: =RGBA(80,80,80,1)\r\n            VerticalAlign: =VerticalAlign.Middle\r\n      - lblColType:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =440\r\n            Y: =56\r\n            Width: =240\r\n            Height: =32\r\n            Text: =\"Movement Type\"\r\n            Size: =11\r\n            FontWeight: =FontWeight.Semibold\r\n            Color: =RGBA(80,80,80,1)\r\n            VerticalAlign: =VerticalAlign.Middle\r\n      - lblColCompleted:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =700\r\n            Y: =56\r\n            Width: =200\r\n            Height: =32\r\n            Text: =\"Date Completed\"\r\n            Size: =11\r\n            FontWeight: =FontWeight.Semibold\r\n            Color: =RGBA(80,80,80,1)\r\n            VerticalAlign: =VerticalAlign.Middle\r\n      - lblColArchived:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =920\r\n            Y: =56\r\n            Width: =200\r\n            Height: =32\r\n            Text: =\"Archived\"\r\n            Size: =11\r\n            FontWeight: =FontWeight.Semibold\r\n            Color: =RGBA(80,80,80,1)\r\n            VerticalAlign: =VerticalAlign.Middle\r\n      - galArchive:\r\n          Control: Gallery@2.15.0\r\n          Variant: verticalGallery\r\n          Properties:\r\n            X: =0\r\n            Y: =88\r\n            Width: =1366\r\n            Height: =680\r\n            Items: |-\r\n              =Sort(\r\n                  Filter(\r\n                      colMovements,\r\n                      Complete &&\r\n                      !IsBlank(DateCompleted) &&\r\n                      DateAdd(DateCompleted, 7, TimeUnit.Days) < Today()\r\n                  ),\r\n                  DateCompleted,\r\n                  SortOrder.Descending\r\n              )\r\n            TemplateSize: =64\r\n            TemplatePadding: =0\r\n            ShowScrollbar: =true\r\n          Children:\r\n            - recRowBg:\r\n                Control: Classic/Button@2.2.0\r\n                Properties:\r\n                  X: =0\r\n                  Y: =0\r\n                  Width: =1366\r\n                  Height: =64\r\n                  Fill: =If(Mod(ThisItem.ID, 2) = 0, RGBA(255,255,255,1), RGBA(246,249,248,1))\r\n                  HoverFill: =RGBA(218,232,229,1)\r\n                  PressedFill: =RGBA(200,220,216,1)\r\n                  DisabledFill: =If(Mod(ThisItem.ID, 2) = 0, RGBA(255,255,255,1), RGBA(246,249,248,1))\r\n                  BorderThickness: =0\r\n                  Text: =\"\"\r\n                  OnSelect: |-\r\n                    =Set(varSelectedRecord, ThisItem);\r\n                    Navigate(scrRecord, ScreenTransition.Cover)\r\n            - recArchiveStripe:\r\n                Control: Classic/Button@2.2.0\r\n                Properties:\r\n                  X: =0\r\n                  Y: =0\r\n                  Width: =5\r\n                  Height: =64\r\n                  Fill: =RGBA(150,150,150,1)\r\n                  HoverFill: =Self.Fill\r\n                  PressedFill: =Self.Fill\r\n                  DisabledFill: =Self.Fill\r\n                  BorderThickness: =0\r\n                  Text: =\"\"\r\n                  DisplayMode: =DisplayMode.View\r\n            - lblArchiveName:\r\n                Control: Label@2.5.1\r\n                Properties:\r\n                  X: =20\r\n                  Y: =10\r\n                  Width: =410\r\n                  Height: =28\r\n                  Text: =ThisItem.Title\r\n                  Size: =14\r\n                  FontWeight: =FontWeight.Semibold\r\n                  Color: =RGBA(80,80,80,1)\r\n                  VerticalAlign: =VerticalAlign.Middle\r\n            - lblArchivePos:\r\n                Control: Label@2.5.1\r\n                Properties:\r\n                  X: =20\r\n                  Y: =38\r\n                  Width: =300\r\n                  Height: =20\r\n                  Text: =Coalesce(ThisItem.'Position Type'.Value, \"\u2014\")\r\n                  Size: =11\r\n                  Color: =RGBA(150,150,150,1)\r\n            - lblArchiveType:\r\n                Control: Label@2.5.1\r\n                Properties:\r\n                  X: =440\r\n                  Y: =18\r\n                  Width: =240\r\n                  Height: =28\r\n                  Text: =Coalesce(ThisItem.'Movement Type'.Value, \"\u2014\")\r\n                  Size: =13\r\n                  Color: =RGBA(120,120,120,1)\r\n                  VerticalAlign: =VerticalAlign.Middle\r\n            - lblArchiveCompleted:\r\n                Control: Label@2.5.1\r\n                Properties:\r\n                  X: =700\r\n                  Y: =18\r\n                  Width: =200\r\n                  Height: =28\r\n                  Text: =If(IsBlank(ThisItem.DateCompleted), \"\u2014\", Text(ThisItem.DateCompleted, \"dd mmm yyyy\"))\r\n                  Size: =13\r\n                  Color: =RGBA(120,120,120,1)\r\n                  VerticalAlign: =VerticalAlign.Middle\r\n            - lblArchiveTag:\r\n                Control: Label@2.5.1\r\n                Properties:\r\n                  X: =920\r\n                  Y: =18\r\n                  Width: =110\r\n                  Height: =28\r\n                  Text: =\"Archived\"\r\n                  Color: =RGBA(100,100,100,1)\r\n                  Fill: =RGBA(220,220,220,1)\r\n                  Size: =11\r\n                  FontWeight: =FontWeight.Semibold\r\n                  Align: =Align.Center\r\n                  VerticalAlign: =VerticalAlign.Middle\r\n                  RadiusTopLeft: =12\r\n                  RadiusTopRight: =12\r\n                  RadiusBottomLeft: =12\r\n                  RadiusBottomRight: =12\r\n            - recArchiveDivider:\r\n                Control: Classic/Button@2.2.0\r\n                Properties:\r\n                  X: =0\r\n                  Y: =63\r\n                  Width: =1366\r\n                  Height: =1\r\n                  Fill: =RGBA(220,224,222,1)\r\n                  HoverFill: =Self.Fill\r\n                  PressedFill: =Self.Fill\r\n                  DisabledFill: =Self.Fill\r\n                  BorderThickness: =0\r\n                  Text: =\"\"\r\n                  DisplayMode: =DisplayMode.View\r\n      - lblArchiveEmpty:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =433\r\n            Y: =400\r\n            Width: =500\r\n            Height: =60\r\n            Text: =\"No archived records yet.\"\r\n            Visible: =CountRows(galArchive.AllItems) = 0\r\n            Color: =RGBA(150,150,150,1)\r\n            Size: =16\r\n            Align: =Align.Center\r\n";

    async function copyYAML() {
      const status = document.getElementById('status');
      try {
        await navigator.clipboard.writeText(yaml);
        status.textContent = '✓ Copied! Paste into PowerApps Studio now.';
        status.className = 'ok';
        setTimeout(() => {
          status.textContent = 'Click to copy again';
          status.className = '';
        }, 4000);
      } catch (e) {
        status.textContent = 'Clipboard blocked — select the text below and copy manually.';
        status.className = 'err';
        const pre = document.createElement('pre');
        pre.style = 'font-size:9px;max-height:200px;overflow:auto;background:#1a1a2e;padding:8px;border-radius:6px;text-align:left;';
        pre.textContent = yaml;
        document.body.appendChild(pre);
      }
    }
  </script>
</body>
</html>
