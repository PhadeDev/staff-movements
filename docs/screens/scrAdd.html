<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PowerApps – scrAdd</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
    }
    h1 { font-size: 1.4rem; font-weight: 400; color: #a0a0c0; }
    .name { font-size: 1.1rem; font-weight: 600; color: #c8b8ff; }
    button {
      padding: 14px 36px;
      font-size: 1.1rem;
      background: #7c4dff;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #6a3de8; }
    button:active { background: #5830cc; }
    #status {
      font-size: 0.9rem;
      color: #888;
      min-height: 1.2em;
      transition: color 0.2s;
    }
    #status.ok { color: #4caf7d; }
    #status.err { color: #e85555; }
    .info {
      font-size: 0.8rem;
      color: #555;
      margin-top: 8px;
      text-align: center;
      line-height: 1.6;
    }
    .build-stamp {
      position: fixed;
      bottom: 14px;
      right: 18px;
      font-size: 0.72rem;
      color: #3a3a55;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      user-select: none;
    }
  </style>
</head>
<body>
  <h1>PowerApps Screen</h1>
  <div class="name">scrAdd</div>
  <button onclick="copyYAML()">Copy YAML to Clipboard</button>
  <div id="status">Click to copy — PowerApps-ready (CRLF, UTF-8)</div>
  <div class="info">
    After copying, open PowerApps Studio &rarr; select a screen &rarr; Ctrl+V<br>
    or use the paste button in the tree view.
  </div>
  <div class="build-stamp">v1.8  —  Built 23 Jun 2026  11:32 BST</div>
  <script>
    const yaml = "Screens:\r\n  scrAdd:\r\n    Properties:\r\n      Fill: =RGBA(248,248,248,1)\r\n      OnVisible: |-\r\n        =Set(varErrAddTitle, false);\r\n        Set(varErrAddMovType, false)\r\n    Children:\r\n      - recHeader:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            X: =0\r\n            Y: =0\r\n            Width: =1366\r\n            Height: =56\r\n            Fill: =RGBA(0,78,66,1)\r\n            HoverFill: =Self.Fill\r\n            PressedFill: =Self.Fill\r\n            DisabledFill: =Self.Fill\r\n            BorderThickness: =0\r\n            DisplayMode: =DisplayMode.View\r\n            Text: =\"\"\r\n      - btnAddCancel:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            X: =8\r\n            Y: =8\r\n            Width: =80\r\n            Height: =40\r\n            Text: =\"Cancel\"\r\n            Color: =RGBA(255,255,255,0.85)\r\n            Fill: =RGBA(255,255,255,0.12)\r\n            HoverFill: =RGBA(255,255,255,0.22)\r\n            PressedFill: =RGBA(255,255,255,0.32)\r\n            DisabledFill: =RGBA(0,0,0,0)\r\n            BorderThickness: =0\r\n            Size: =14\r\n            OnSelect: =Navigate(scrDashboard, ScreenTransition.UnCover)\r\n      - lblAddTitle:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =100\r\n            Y: =0\r\n            Width: =600\r\n            Height: =56\r\n            Text: =\"Add New Movement\"\r\n            Color: =RGBA(255,255,255,1)\r\n            Size: =18\r\n            FontWeight: =FontWeight.Bold\r\n            VerticalAlign: =VerticalAlign.Middle\r\n      - recFormCard:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            X: =83\r\n            Y: =80\r\n            Width: =1200\r\n            Height: =580\r\n            Fill: =RGBA(255,255,255,1)\r\n            HoverFill: =Self.Fill\r\n            PressedFill: =Self.Fill\r\n            DisabledFill: =Self.Fill\r\n            BorderColor: =RGBA(210,218,215,1)\r\n            BorderThickness: =1\r\n            RadiusTopLeft: =8\r\n            RadiusTopRight: =8\r\n            RadiusBottomLeft: =8\r\n            RadiusBottomRight: =8\r\n            DisplayMode: =DisplayMode.View\r\n            Text: =\"\"\r\n      - lblAddTitleFieldLabel:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =107\r\n            Y: =100\r\n            Width: =500\r\n            Height: =18\r\n            Text: =\"Rank/Title and Full Name *\"\r\n            Color: =RGBA(80,80,80,1)\r\n            Size: =12\r\n      - recErrAddTitle:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            X: =107\r\n            Y: =118\r\n            Width: =500\r\n            Height: =44\r\n            Fill: =RGBA(0,0,0,0)\r\n            DisabledFill: =RGBA(0,0,0,0)\r\n            HoverFill: =RGBA(0,0,0,0)\r\n            PressedFill: =RGBA(0,0,0,0)\r\n            BorderColor: =If(varErrAddTitle, RGBA(163,45,45,1), RGBA(0,0,0,0))\r\n            BorderThickness: =If(varErrAddTitle, 2, 0)\r\n            RadiusTopLeft: =6\r\n            RadiusTopRight: =6\r\n            RadiusBottomLeft: =6\r\n            RadiusBottomRight: =6\r\n            DisplayMode: =DisplayMode.View\r\n            Text: =\"\"\r\n      - txtAddName:\r\n          Control: ModernTextInput@1.1.0\r\n          Properties:\r\n            X: =107\r\n            Y: =118\r\n            Width: =500\r\n            Height: =44\r\n            Placeholder: =\"e.g. Cpl J Smith\"\r\n      - lblAddMovTypeLabel:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =683\r\n            Y: =100\r\n            Width: =540\r\n            Height: =18\r\n            Text: =\"Movement Type *\"\r\n            Color: =RGBA(80,80,80,1)\r\n            Size: =12\r\n      - recErrAddMovType:\r\n          Control: Classic/Button@2.2.0\r\n          Properties:\r\n            X: =683\r\n            Y: =118\r\n            Width: =540\r\n            Height: =44\r\n            Fill: =RGBA(0,0,0,0)\r\n            DisabledFill: =RGBA(0,0,0,0)\r\n            HoverFill: =RGBA(0,0,0,0)\r\n            PressedFill: =RGBA(0,0,0,0)\r\n            BorderColor: =If(varErrAddMovType, RGBA(163,45,45,1), RGBA(0,0,0,0))\r\n            BorderThickness: =If(varErrAddMovType, 2, 0)\r\n            RadiusTopLeft: =6\r\n            RadiusTopRight: =6\r\n            RadiusBottomLeft: =6\r\n            RadiusBottomRight: =6\r\n            DisplayMode: =DisplayMode.View\r\n            Text: =\"\"\r\n      - drpAddMovType:\r\n          Control: ModernDropdown@1.0.1\r\n          Properties:\r\n            X: =683\r\n            Y: =118\r\n            Width: =540\r\n            Height: =44\r\n            Items: =[\"New to MoD/Branch\", \"Moving to Branch\", \"Leaving Branch\", \"Leaving MoD\"]\r\n            Default: '={Value: \"New to MoD/Branch\"}'\r\n      - lblAddPosTypeLabel:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =107\r\n            Y: =178\r\n            Width: =500\r\n            Height: =18\r\n            Text: =\"Position Type\"\r\n            Color: =RGBA(80,80,80,1)\r\n            Size: =12\r\n      - drpAddPosType:\r\n          Control: ModernDropdown@1.0.1\r\n          Properties:\r\n            X: =107\r\n            Y: =196\r\n            Width: =500\r\n            Height: =44\r\n            Items: =[\"Officer\", \"Other Rank (OR)\", \"Civilian\", \"Contractor\"]\r\n            Default: '={Value: \"\"}'\r\n      - lblAddStaffNoLabel:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =683\r\n            Y: =178\r\n            Width: =540\r\n            Height: =18\r\n            Text: =\"Staff/Service No or PUID\"\r\n            Color: =RGBA(80,80,80,1)\r\n            Size: =12\r\n      - txtAddStaffNo:\r\n          Control: ModernTextInput@1.1.0\r\n          Properties:\r\n            X: =683\r\n            Y: =196\r\n            Width: =540\r\n            Height: =44\r\n            Placeholder: =\"Service number or PUID\"\r\n      - lblAddRoleLabel:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =107\r\n            Y: =256\r\n            Width: =500\r\n            Height: =18\r\n            Text: =\"Desired Role Name\"\r\n            Color: =RGBA(80,80,80,1)\r\n            Size: =12\r\n      - txtAddRole:\r\n          Control: ModernTextInput@1.1.0\r\n          Properties:\r\n            X: =107\r\n            Y: =274\r\n            Width: =500\r\n            Height: =44\r\n            Placeholder: =\"Post or role title\"\r\n      - lblAddStartDateLabel:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =683\r\n            Y: =256\r\n            Width: =540\r\n            Height: =18\r\n            Text: =\"Confirmed Start Date\"\r\n            Color: =RGBA(80,80,80,1)\r\n            Size: =12\r\n      - dpAddStartDate:\r\n          Control: Classic/DatePicker@2.6.0\r\n          Properties:\r\n            X: =683\r\n            Y: =274\r\n            Width: =300\r\n            Height: =44\r\n            DefaultDate: =Today()\r\n      - lblAddNotesLabel:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =107\r\n            Y: =334\r\n            Width: =1116\r\n            Height: =18\r\n            Text: =\"Notes\"\r\n            Color: =RGBA(80,80,80,1)\r\n            Size: =12\r\n      - txtAddNotes:\r\n          Control: ModernTextInput@1.1.0\r\n          Properties:\r\n            X: =107\r\n            Y: =352\r\n            Width: =1116\r\n            Height: =120\r\n            Placeholder: =\"Any additional notes...\"\r\n            Type: =TextInputType.Multiline\r\n      - lblAddErrMsg:\r\n          Control: Label@2.5.1\r\n          Properties:\r\n            X: =107\r\n            Y: =488\r\n            Width: =760\r\n            Height: =24\r\n            Text: =\"Name and Movement Type are required.\"\r\n            Color: =RGBA(163,45,45,1)\r\n            Size: =12\r\n            Visible: =varErrAddTitle || varErrAddMovType\r\n      - btnAddSave:\r\n          Control: ModernButton@1.0.0\r\n          Properties:\r\n            X: =1063\r\n            Y: =590\r\n            Width: =180\r\n            Height: =44\r\n            Text: =\"Add Movement\"\r\n            BasePaletteColor: =RGBA(0,78,66,1)\r\n            OnSelect: |-\r\n              =Set(varErrAddTitle, IsBlank(Trim(txtAddName.Text)));\r\n              Set(varErrAddMovType, IsBlank(drpAddMovType.Selected.Value));\r\n              If(\r\n                  varErrAddTitle || varErrAddMovType,\r\n                  false,\r\n                  Set(varSelectedRecord,\r\n                      Patch('Staff Movements (LTD)', Defaults('Staff Movements (LTD)'),\r\n                          {\r\n                              Title: Trim(txtAddName.Text),\r\n                              'Movement Type': {Value: drpAddMovType.Selected.Value},\r\n                              'Position Type': {Value: drpAddPosType.Selected.Value},\r\n                              Staff_x002f_ServiceNo: Trim(txtAddStaffNo.Text),\r\n                              'Desired Role Name': Trim(txtAddRole.Text),\r\n                              'Confirmed Start Date': dpAddStartDate.SelectedDate,\r\n                              Notes: txtAddNotes.Text,\r\n                              Complete: false\r\n                          }\r\n                      )\r\n                  );\r\n                  ClearCollect(colMovements, 'Staff Movements (LTD)');\r\n                  Set(varErrAddTitle, false);\r\n                  Set(varErrAddMovType, false);\r\n                  Notify(\"Movement added.\", NotificationType.Success);\r\n                  Navigate(scrRecord, ScreenTransition.Cover)\r\n              )\r\n";

    async function copyYAML() {
      const status = document.getElementById('status');
      try {
        await navigator.clipboard.writeText(yaml);
        status.textContent = '✓ Copied! Paste into PowerApps Studio now.';
        status.className = 'ok';
        setTimeout(() => {
          status.textContent = 'Click to copy again';
          status.className = '';
        }, 4000);
      } catch (e) {
        status.textContent = 'Clipboard blocked — select the text below and copy manually.';
        status.className = 'err';
        const pre = document.createElement('pre');
        pre.style = 'font-size:9px;max-height:200px;overflow:auto;background:#1a1a2e;padding:8px;border-radius:6px;text-align:left;';
        pre.textContent = yaml;
        document.body.appendChild(pre);
      }
    }
  </script>
</body>
</html>
